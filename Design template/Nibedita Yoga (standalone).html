document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

. নিবেদিতা যোগ প্রশিক্ষণ কেন্দ্র.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <h4 style=\"margin:0 0 16px;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#F4A04A;\">Quick Links<\u002Fh4>\n        <div style=\"display:flex;flex-direction:column;gap:11px;\">\n          <a href=\"#top\" style=\"color:inherit;text-decoration:none;font-size:15px;\">Home<\u002Fa>\n          <a href=\"#about\" style=\"color:inherit;text-decoration:none;font-size:15px;\">Yoga Articles<\u002Fa>\n          <a href=\"#courses\" style=\"color:inherit;text-decoration:none;font-size:15px;\">Asana Guide<\u002Fa>\n          <a href=\"#testimonials\" style=\"color:inherit;text-decoration:none;font-size:15px;\">Events<\u002Fa>\n          <a href=\"#contact\" style=\"color:inherit;text-decoration:none;font-size:15px;\">Member Portal<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <h4 style=\"margin:0 0 16px;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#F4A04A;\">Contact Us<\u002Fh4>\n        <div style=\"display:flex;flex-direction:column;gap:11px;font-size:15px;line-height:1.5;\">\n          <span>Ground Floor, Siddhaye Apartment, Debaipukur Road, Hindmotor, Hooghly, WB 712233<\u002Fspan>\n          <a href=\"tel:+918017112877\" style=\"color:inherit;text-decoration:none;\">+91 80171 12877<\u002Fa>\n          <a href=\"https://wa.me/918017112877\" target=\"_blank\" rel=\"noopener\" style=\"color:#F4A04A;text-decoration:none;font-weight:600;\">WhatsApp →<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:relative;border-top:1px solid rgba(250,247,242,.1);padding:22px 0;text-align:center;font-size:13px;color:rgba(250,247,242,.5);\">© 2026 Nibedita Yoga Training Centre. All rights reserved.<\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- floating WhatsApp -->\n  <a href=\"https://wa.me/918017112877\" target=\"_blank\" rel=\"noopener\" aria-label=\"Chat on WhatsApp\" class=\"nyc-wa\" style=\"position:fixed;right:clamp(16px,3vw,28px);bottom:clamp(16px,3vw,28px);z-index:90;width:58px;height:58px;border-radius:50%;background:#25D366;display:grid;place-items:center;box-shadow:0 12px 28px -8px rgba(37,211,102,.7);animation:nyc-breathe 3s ease-in-out infinite;text-decoration:none;font-size:26px;\">💬<\u002Fa>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:3200},&quot;defaultLang&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;EN&quot;,&quot;HI&quot;,&quot;BN&quot;],&quot;default&quot;:&quot;EN&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showMandala&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;hideNavOnScroll&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    lang: 'EN',\n    navHidden: false,\n    menuOpen: false,\n    isMobile: typeof window !== 'undefined' && window.innerWidth < 860,\n    statsStarted: false,\n    statsDone: false,\n    scrollProg: 0,\n    years: 0, students: 0, levels: 0,\n    formSent: false,\n  };\n\n  componentDidMount() {\n    if (this.props.defaultLang) this.setState({ lang: this.props.defaultLang });\n\n    // scroller-agnostic engine: derive scroll progress + nav direction from a rAF watcher\n    this._root = document.querySelector('[data-nyc-root]');\n    this._lastScroll = 0;\n    this._lastTop = null;\n    this._tick = () => {\n      const root = this._root || (this._root = document.querySelector('[data-nyc-root]'));\n      if (root) {\n        const r = root.getBoundingClientRect();\n        if (r.top !== this._lastTop) {\n          this._lastTop = r.top;\n          const vh = window.innerHeight;\n          const scrolled = -r.top;\n          const total = r.height - vh;\n          const prog = total > 0 ? Math.max(0, Math.min(1, scrolled / total)) : 0;\n          if (Math.abs(prog - this.state.scrollProg) > 0.0015) this.setState({ scrollProg: prog });\n          if (this.props.hideNavOnScroll !== false) {\n            let hidden = this.state.navHidden;\n            if (scrolled > this._lastScroll + 1 && scrolled > 80 && !this.state.menuOpen) hidden = true;\n            else if (scrolled < this._lastScroll - 1) hidden = false;\n            if (hidden !== this.state.navHidden) this.setState({ navHidden: hidden });\n          }\n          this._lastScroll = scrolled;\n        }\n      }\n      this._rafId = requestAnimationFrame(this._tick);\n    };\n    this._rafId = requestAnimationFrame(this._tick);\n\n    this._onResize = () => {\n      const m = window.innerWidth < 860;\n      if (m !== this.state.isMobile) this.setState({ isMobile: m, menuOpen: m ? this.state.menuOpen : false });\n    };\n    window.addEventListener('resize', this._onResize);\n\n    const el = document.getElementById('stats');\n    if (el && 'IntersectionObserver' in window) {\n      this._io = new IntersectionObserver((entries) => {\n        entries.forEach((e) => {\n          if (e.isIntersecting && !this.state.statsStarted) {\n            this.setState({ statsStarted: true });\n            this._animate();\n          }\n        });\n      }, { threshold: 0.35 });\n      this._io.observe(el);\n    } else {\n      this.setState({ years: 15, students: 500, levels: 3, statsDone: true });\n    }\n\n    // section reveal-on-scroll — respects prefers-reduced-motion, triggers once\n    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    if (!reduce && 'IntersectionObserver' in window) {\n      const items = Array.prototype.slice.call(document.querySelectorAll('[data-reveal]'));\n      items.forEach((el) => {\n        const kind = el.getAttribute('data-reveal');\n        let delay = 0;\n        if (kind === 'card' && el.parentNode) delay = Array.prototype.indexOf.call(el.parentNode.children, el) * 0.15;\n        el.style.opacity = '0';\n        if (kind !== 'image') el.style.transform = 'translateY(24px)';\n        el.style.transition = 'opacity ' + (kind === 'image' ? '0.8s' : '0.6s') + ' ease-out ' + delay + 's, transform 0.6s ease-out ' + delay + 's';\n        el.style.willChange = 'opacity, transform';\n      });\n      this._rio = new IntersectionObserver((ents) => {\n        ents.forEach((e) => { if (e.isIntersecting) { e.target.style.opacity = '1'; e.target.style.transform = 'none'; this._rio.unobserve(e.target); } });\n      }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n      items.forEach((el) => this._rio.observe(el));\n    }\n  }\n\n  componentWillUnmount() {\n    if (this._rafId) cancelAnimationFrame(this._rafId);\n    window.removeEventListener('resize', this._onResize);\n    if (this._io) this._io.disconnect();\n    if (this._rio) this._rio.disconnect();\n  }\n\n  _animate() {\n    const dur = 3000, start = performance.now();\n    const step = (now) => {\n      const t = Math.min(1, (now - start) / dur);\n      const e = 1 - Math.pow(1 - t, 4); // easeOutQuart — decelerates heavily, \"breathes\" to a stop\n      this.setState({\n        years: Math.round(15 * e),\n        students: Math.round(500 * e),\n        levels: Math.round(3 * e),\n      });\n      if (t < 1) requestAnimationFrame(step);\n      else this.setState({ statsDone: true });\n    };\n    requestAnimationFrame(step);\n  }\n\n  renderVals() {\n    const L = this.state.lang;\n    const T = {\n      EN: { l1: 'Nibedita Yoga', l2: 'Training Centre', sub: 'Expert guidance in Hatha, Vinyasa & Pranayama. Batches for all levels, all ages.',\n            home: 'Home', yoga: 'Yoga', courses: 'Courses', events: 'Events', members: 'Members' },\n      HI: { l1: 'निबेदिता योग', l2: 'प्रशिक्षण केंद्र', sub: 'हठ, विन्यास और प्राणायाम में विशेषज्ञ मार्गदर्शन। सभी स्तरों और सभी आयु के लिए बैच।',\n            home: 'होम', yoga: 'योग', courses: 'पाठ्यक्रम', events: 'आयोजन', members: 'सदस्य' },\n      BN: { l1: 'নিবেদিতা যোগ', l2: 'প্রশিক্ষণ কেন্দ্র', sub: 'হঠ, বিন্যাস ও প্রাণায়ামে বিশেষজ্ঞ নির্দেশনা। সকল স্তর ও সকল বয়সের জন্য ব্যাচ।',\n            home: 'হোম', yoga: 'যোগ', courses: 'কোর্স', events: 'ইভেন্ট', members: 'সদস্য' },\n    }[L];\n\n    const pill = (active) => ({ bg: active ? '#E8740C' : 'transparent', fg: active ? '#fff' : '#0D6B6E' });\n    const en = pill(L === 'EN'), hi = pill(L === 'HI'), bn = pill(L === 'BN');\n\n    return {\n      navY: this.state.navHidden ? '-115%' : '0px',\n      showDesktopNav: !this.state.isMobile,\n      isMobile: this.state.isMobile,\n      menuOpen: this.state.menuOpen,\n      toggleMenu: () => this.setState((s) => ({ menuOpen: !s.menuOpen })),\n      closeMenu: () => this.setState({ menuOpen: false }),\n\n      heroL1: T.l1, heroL2: T.l2, heroSub: T.sub,\n      navHome: T.home, navYoga: T.yoga, navCourses: T.courses, navEvents: T.events, navMembers: T.members,\n\n      setEN: () => this.setState({ lang: 'EN' }),\n      setHI: () => this.setState({ lang: 'HI' }),\n      setBN: () => this.setState({ lang: 'BN' }),\n      enBg: en.bg, enFg: en.fg, hiBg: hi.bg, hiFg: hi.fg, bnBg: bn.bg, bnFg: bn.fg,\n\n      mandalaOpacity: (this.props.showMandala === false) ? 0 : 0.16,\n\n      yearsTxt: this.state.years + (this.state.statsDone ? '+' : ''),\n      studentsTxt: this.state.students + (this.state.statsDone ? '+' : ''),\n      levelsTxt: '' + this.state.levels,\n      railPct: (this.state.scrollProg * 100).toFixed(1) + '%',\n\n      testimonials: [\n        { quote: 'Joining Nibedita was the best decision I made for my health. My back pain of 10 years is almost completely gone.', initial: 'P', name: 'Priya Sharma', role: 'School Teacher, Delhi' },\n        { quote: 'I came here skeptical — yoga seemed too gentle for me. Six months later, I have never been stronger or more flexible.', initial: 'R', name: 'Rahul Verma', role: 'Software Engineer, Bengaluru' },\n        { quote: 'At 65, I thought I was too old to start. The teacher adapted everything perfectly. My sleep and energy have transformed.', initial: 'M', name: 'Meena Devi', role: 'Retired, Kolkata' },\n        { quote: 'The trilingual teaching is wonderful. I could follow in Bengali from day one, which made everything so much clearer.', initial: 'A', name: 'Arnab Roy', role: 'Business Owner, Kolkata' },\n        { quote: 'My blood sugar levels have consistently improved since I started the diabetes-specific program. My doctor is impressed.', initial: 'S', name: 'Sunita Agarwal', role: 'Home-maker, Varanasi' },\n      ],\n\n      courses: [\n        { title: 'Hatha Yoga', desc: 'Classical postures, alignment and breath — the steady foundation for a lifelong practice.' },\n        { title: 'Pranayama', desc: 'Breath-work and energy regulation to calm the mind and build vitality and focus.' },\n        { title: 'Therapeutic Yoga', desc: 'Gentle, condition-specific sequences for back care, diabetes, stress and recovery.' },\n      ],\n\n      showForm: !this.state.formSent,\n      formSent: this.state.formSent,\n      submitForm: (e) => { e.preventDefault(); this.setState({ formSent: true }); },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
